name: Repo Engagement Analytics

on:
  schedule:
    - cron: "0 20 * * 3"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  analytics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Fetch all branches
        run: |
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install @octokit/rest

      - name: Run analytics script
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: node .github/workflows/analytics.js

      - name: Commit snapshot reports
        run: |
          git config user.name "analytics-bot"
          git config user.email "analytics-bot@users.noreply.github.com"

          git add reports/

          git diff --cached --quiet || (
            git commit -m "chore: add analytics snapshot [skip ci]"
            git push
          )
